# ─────────────────────────────────────────────────────────────────────────────
#  ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ  ·  bot-messages.yml
#  Chat messages bots randomly send. Add, remove, or edit freely.
#  Placeholders:
#    {name}          — the bot's own name
#    {random_player} — a random online real player's name (or the joiner/deceased
#                      for join-reactions and death-reactions respectively)
#    {player_name}   — the specific player the bot is reacting to
#                      (used in player-chat-reactions pool)
#    {online}        — number of real (non-bot) players online
#    {world}         — the bot's current world name
#    {time}          — "day" or "night" based on the world's time
#    {biome}         — the bot's current biome (e.g. "plains", "dark forest")
#    {x} {y} {z}    — the bot's current block coordinates
#    {server}        — the server ID (database.server-id in config.yml)
#    {date}          — today's date (e.g. 2026-04-05)
#    {day}           — full day of week (e.g. Sunday)
# ─────────────────────────────────────────────────────────────────────────────

