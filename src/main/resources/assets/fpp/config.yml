# ─────────────────────────────────────────────────────────────────────────────
#  ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ  ·  config.yml  ·  v1.6.2
#  Run /fpp reload to apply most changes without restarting the server.
#  Colors use MiniMessage: <#0079FF>text</#0079FF>  or  <gray>text</gray>
# ─────────────────────────────────────────────────────────────────────────────

# Internal — managed automatically. Do NOT edit.
config-version: 67
language: en

# ═════════════════════════════════════════════════════════════════════════════
#  1 · SPAWNING
# ═════════════════════════════════════════════════════════════════════════════

# ── Bot Limits ────────────────────────────────────────────────────────────────
limits:
  max-bots: 1000                    # Global cap across all spawners. 0 = unlimited.
  user-bot-limit: 1                 # Personal limit for fpp.user.spawn players.
  spawn-presets: [1, 5, 10, 15, 20] # Tab-complete count suggestions for /fpp spawn

# How many seconds a player must wait between /fpp spawn uses.
# 0 = disabled. Players with fpp.bypass.cooldown are always exempt.
spawn-cooldown: 0

# ── Persistence ───────────────────────────────────────────────────────────────
# Bots save their position on shutdown and rejoin at that location on restart.
# Active tasks (mine/place/patrol) also survive restarts via the database.
persistence:
  enabled: true

# ── Join & Leave Timing ───────────────────────────────────────────────────────
# Stagger batch spawns/despawns over a random delay so they look like natural
# player activity rather than an instant flood.
# Values are in TICKS — 20 ticks = 1 second.
# Quick reference:  0 = instant · 20 = 1 s · 40 = 2 s · 100 = 5 s
join-delay:
  min: 0   # ticks
  max: 1   # ticks

leave-delay:
  min: 0   # ticks
  max: 1   # ticks


# ═════════════════════════════════════════════════════════════════════════════
#  2 · APPEARANCE
# ═════════════════════════════════════════════════════════════════════════════

# ── Display Names ─────────────────────────────────────────────────────────────
# Placeholders: {bot_name}  {spawner}  {num}
# Colors:  <#0079FF>{bot_name}</#0079FF>  or  <gray>{bot_name}</gray>
bot-name:
  # Name source for auto-generated bot names (no --name flag).
  #   pool   — pick from bot-names.yml (requires names in the file)
  #   random — generate a realistic Minecraft-style username on the fly (default)
  mode: random

  admin-format: '{bot_name}'           # Used for /fpp spawn (admin)
  user-format:  'bot-{spawner}-{num}'  # Used for /fpp spawn (user tier)

# ── Skins ─────────────────────────────────────────────────────────────────────
# mode: player — Copy / fetch player skins by name (legacy alias: auto).
# mode: random — Use overrides, pool, and skins/ folder (legacy alias: custom).
# mode: none   — No custom skin. All bots use default Steve / Alex appearance.
skin:
  mode: player
  guaranteed-skin: true         # true = bots that can't resolve their name always use a fallback skin
  clear-cache-on-reload: true

  # ── random mode only ──────────────────────────────────────────────────────
  overrides: {}                 # Per-bot override: bot-name: minecraft-username
  pool: []                      # Random skin pool — list of Minecraft usernames
  use-skin-folder: true         # Scan plugins/FakePlayerPlugin/skins/ for PNG files

# ── Tab List ──────────────────────────────────────────────────────────────────
# true  = bots show in the player tab list (default)
# false = bots are hidden from the tab list (still counted in server player count)
tab-list:
  enabled: true

# ── Server List (MOTD ping) ────────────────────────────────────────────────────
# Controls how bots affect the player count shown in the server list / MOTD.
server-list:
  count-bots: true          # true  = bots are counted in the MOTD player number
                            # false = only real players are counted
  include-remote-bots: false # true  = also add bots from other NETWORK-mode servers
                            #         to this server's displayed count (useful for hubs)

# ── LuckPerms ─────────────────────────────────────────────────────────────────
# Bots are real NMS ServerPlayer entities — LuckPerms handles them natively.
# Prefix, suffix, and tab-list ordering are applied automatically.
luckperms:
  default-group: ""   # LP group assigned at spawn. Blank = LP "default" group.
                      # Change individual bots with "/fpp rank <bot> <group>".

# ── Badword Filter ────────────────────────────────────────────────────────────
# Prevent bots from being spawned with names containing forbidden words.
# Matching is case-insensitive and partial (e.g. if "hell" is forbidden, "hellish" is rejected).
# Whitelist allows specific bot names even if they contain a badword.
badword-filter:
  enabled: true                     # true = enable badword filtering; false = allow all names
  use-global-list: false             # true = fetch the remote global profanity list below
  global-list-url: "https://www.cs.cmu.edu/~biglou/resources/bad-words.txt"
  global-list-timeout-ms: 5000      # Fetch timeout for the remote list (startup / reload)
  words: []                         # Inline word list — merged with bad-words.yml
  whitelist: []                     # Allowed names that contain badwords — e.g. ["HellaBot", "Helena"]
  auto-rename: true                 # true  = bad names silently replaced with a random clean name from bot-names.yml
                                    # false = bad names are hard-blocked and the spawn is refused

  # ── Auto-Detection ────────────────────────────────────────────────────────
  # Extends matching beyond the basic leet-speak substitutions to catch
  # evasion attempts that use repetition, separators, and regex-detectable splits.
  #
  # What each mode adds on top of the always-on leet-speak normalization:
  #   off      — only plain leet: 0→o  1→i  3→e  4→a  5→s  6→g  7→t  8→b  _→removed
  #   normal   — leet + collapse consecutive repeated characters + regex checks for
  #              repeated letters / separator insertions
  #              e.g. "assshole", "aasshole" both collapse and match "asshole"
  #   strict   — normal + single-gap regex matching for alternating filler chars
  #              e.g. "fXuXcXk", "n1i1g1g1e1r" style evasion
  #
  # Increasing strictness may produce false positives on unusual bot names.
  auto-detection:
    enabled: true                   # true  = enable auto-detection enhancements
    mode: normal                    # off | normal | strict

# ── Bot Interaction ───────────────────────────────────────────────────────────
# Controls how players can interact with bot entities in-world.
bot-interaction:
  right-click-enabled: true         # true = right-click opens inventory/executes command
                                    # false = bots ignore all right-click interactions
  shift-right-click-settings: true  # true = shift+right-click opens bot settings GUI
                                    # false = shift+right-click does nothing

# ── Messages ──────────────────────────────────────────────────────────────────
messages:
  join-message: true          # Broadcast "<Name> joined the game"
  leave-message: true         # Broadcast "<Name> left the game"
  death-message: true         # Broadcast the vanilla "X was slain by Y" death message when a bot dies
  kill-message: false         # Broadcast when a real player kills a bot
  notify-admins-on-join: true # Send compatibility warnings to online admins on join


# ═════════════════════════════════════════════════════════════════════════════
#  3 · BODY & COMBAT
# ═════════════════════════════════════════════════════════════════════════════

# ── Bot Body ──────────────────────────────────────────────────────────────────
# The physical entity that appears in the world.
body:
  enabled:      true   # false = tab-list / player-count only, no entity in world
  pushable:     true   # true = players and explosions can push the body
  damageable:   true   # true = body can take ALL damage (player + environmental)
                       # false = immune to player/entity damage only (fall, fire, etc. still apply)
  pick-up-items: true  # true = bots pick up items from the ground like a real player
  pick-up-xp:   true   # true = bots pick up XP orbs from the ground like a real player
  drop-items-on-despawn: false  # false = bot remembers inventory + XP on despawn/respawn; true = drop everything to the ground

# ── Combat ────────────────────────────────────────────────────────────────────
combat:
  max-health: 20.0   # Bot max HP. 20.0 = standard player (2 HP = 1 heart).
  hurt-sound: true   # Play the hurt sound when a bot takes damage.

# ── Death & Respawn ───────────────────────────────────────────────────────────
death:
  respawn-on-death: false   # true = bot respawns at its spawn location after dying
  respawn-delay: 15         # Ticks before respawn (20 = 1 s · 60 = 3 s · 100 = 5 s)
  suppress-drops: false     # false = bots drop items/xp on death like real players; true = suppress all drops

# ── Chunk Loading ─────────────────────────────────────────────────────────────
# Bots keep surrounding chunks loaded exactly like a real player.
# Mobs spawn, redstone ticks, and crops grow inside the loaded radius.
chunk-loading:
  enabled: true
  radius: "auto"   # Chunk radius to keep loaded around each bot:
                   #   "auto" = automatically match the server's simulation-distance (recommended)
                   #      0   = bots load NO chunks at all (disables chunk loading via radius)
                   #      N   = fixed radius of N chunks (e.g. 4, 6, 10)
  update-interval: 20  # Ticks between position re-checks. 20 = 1 second.
                       # Lower = more responsive, higher = less overhead.
  mass-disable-threshold: 100  # 0 = never auto-disable. When active bots reach this count,
                               # plugin chunk tickets are released to avoid mass-bot lag.
                                # Pathfinding can still plan through unloaded chunks.

# ── Automation Defaults ───────────────────────────────────────────────────────
# Defaults copied to newly spawned/restored bots. Existing bots keep per-bot values.
automation:
  auto-eat: true        # Bots eat food from inventory when hunger prevents sprinting.
  auto-place-bed: true  # Bots may place a bed from inventory for auto-sleep, then break it after waking.


# ═════════════════════════════════════════════════════════════════════════════
#  4 · AI & NAVIGATION
#  AI behaviours shared across all bot systems: head tracking, swimming,
#  collision physics, pathfinding, and the (coming soon) PVP combat engine.
# ═════════════════════════════════════════════════════════════════════════════

# ── Head AI ───────────────────────────────────────────────────────────────────
# Bots smoothly rotate to look at the nearest visible player within range.
head-ai:
  enabled: true
  look-range: 8.0   # Detection radius in blocks
  turn-speed: 0.3   # Rotation smoothing — 0.0 = frozen · 1.0 = instant snap
  tick-rate: 3      # Run the scan + raycast every N ticks instead of every tick.
                    # Higher = lower CPU cost. 3 ≈ 7 scans/s, imperceptible to players.
                    # Range: 1 (every tick) to 20 (once per second).

# ── Swim AI ───────────────────────────────────────────────────────────────────
# Bots automatically swim upward when submerged, mimicking a player holding Jump.
swim-ai:
  enabled: true  # controls passive upward swimming only; pathfinding water avoidance is enforced by default

# ── Collision & Push ──────────────────────────────────────────────────────────
# Controls how hard players push bots on contact and how bots separate from each other.
# Defaults work well for most servers — only change if you notice stacking issues.
collision:
  walk-radius: 0.85              # Radius (blocks) at which walking into a bot pushes it
  walk-strength: 0.22            # Push force when a player walks into a bot
  hit-strength: 0.45             # Knockback force on a direct hit
  hit-max-horizontal-speed: 0.80 # Max horizontal speed from hit / explosion knockback
  bot-radius: 0.90               # Radius for bot-vs-bot separation
  bot-strength: 0.14             # Separation force applied between two bots
  max-horizontal-speed: 0.30     # Push speed cap for walk and separation sources

# ── Pathfinding ───────────────────────────────────────────────────────────────
# Shared A* navigation options used by /fpp move, /fpp mine, /fpp place,
# /fpp use, and patrol waypoints. Changes take effect on the next recalculation.
pathfinding:
  # ── Feature Flags ─────────────────────────────────────────────────────────
  parkour: false         # Sprint-jump across 1–2 block gaps
  break-blocks: false    # Break solid blocks that block the path
  place-blocks: false    # Place blocks to bridge 1-block gaps
  place-material: DIRT   # Material placed when bridging (any solid block name)

  # ── Navigation Tuning ─────────────────────────────────────────────────────
  arrival-distance: 1.2          # Reached-destination radius for fixed goals
  patrol-arrival-distance: 1.5   # Reached-waypoint radius for patrol loops
  waypoint-arrival-distance: 0.65 # Active path waypoint snap radius
  sprint-distance: 6.0           # Start sprinting when farther than this many blocks
  follow-recalc-distance: 3.5    # Moving targets force a recalc after moving this far
  follow-recalc-interval: 100    # Follow heartbeat recalc interval in ticks
  recalc-interval: 60            # Heartbeat recalc interval in ticks

  # ── Stuck Detection ────────────────────────────────────────────────────────
  stuck-ticks: 5                 # Low-movement ticks before a bot is considered stuck
  stuck-threshold: 0.04          # Min horizontal movement per tick before triggering stuck logic

  # ── Block Interaction ──────────────────────────────────────────────────────
  break-ticks: 15                # Ticks spent breaking one path-blocking block
  place-ticks: 5                 # Ticks spent placing one bridge block

  # ── Search Limits ─────────────────────────────────────────────────────────
  max-range: 64                  # Max straight-line search range in blocks
  max-nodes: 900                 # Node cap for plain searches
  max-nodes-extended: 1800       # Node cap when parkour/break/place are enabled
  max-fall: 3                    # Max blocks the bot will fall during navigation (1-16)

# ═════════════════════════════════════════════════════════════════════════════
#  5 · BOT CHAT
#  Bots send random messages from bot-messages.yml at configurable intervals.
#  Messages fire as real AsyncChatEvent — EssentialsChat, VentureChat, etc.
#  format them exactly like a real player's message (no [Not Secure] label).
# ═════════════════════════════════════════════════════════════════════════════
fake-chat:
  enabled: false
  require-player-online: true  # Only chat when at least one real player is online
  chance: 0.75                 # Probability (0.0–1.0) a message fires each interval
  interval:
    min: 5    # Minimum seconds between a bot's messages
    max: 10   # Maximum seconds between a bot's messages

  # ── Realism ────────────────────────────────────────────────────────────────
  typing-delay: true        # Simulate a typing pause (0–2.5 s) before each message
  activity-variation: true  # Give each bot a random frequency tier (quiet → chatty)
  history-size: 5           # How many of its own recent messages a bot avoids repeating
  stagger-interval: 3       # Minimum seconds between any two bots chatting (0 = off)

  burst-chance: 0.12        # Chance a bot sends a quick follow-up message
  burst-delay:
    min: 2
    max: 5

  # ── Bot-to-Bot Conversations ───────────────────────────────────────────────
  # Bots can respond to each other's chat messages, creating simulated conversations.
  # When a bot sends a natural message, another bot may reply after a short delay,
  # and the conversation can chain back and forth up to max-chain exchanges.
  bot-to-bot:
    enabled: true
    reply-chance: 0.35       # Probability another bot replies to a chatting bot
    chain-chance: 0.40       # Probability the conversation continues after each exchange
    max-chain: 3             # Maximum exchanges in one conversation thread
    cooldown: 8              # Seconds between separate bot-to-bot conversation starts (server-wide)
    delay:
      min: 4                 # Min seconds before the bot-to-bot reply fires
      max: 14                # Max seconds before the bot-to-bot reply fires

  # ── Mention Replies ────────────────────────────────────────────────────────
  # A bot may reply when a player says its name in chat.
  reply-to-mentions: true
  mention-reply-chance: 0.65  # Probability (0.0–1.0) the named bot replies
  reply-delay:
    min: 2
    max: 8

  # ── Remote Format ──────────────────────────────────────────────────────────
  # Format used when a bodyless or proxy-remote bot sends a chat message.
  # Supports {name} (display name) and {message} (message text).
  remote-format: "<yellow>{name}<dark_gray>: <white>{message}"

  # ── Event-Triggered Reactions ──────────────────────────────────────────────
  # Bots react to server events using message pools from bot-messages.yml.
  event-triggers:
    enabled: true   # Master switch — also controls all sub-triggers below

    on-player-join:
      enabled: true
      chance: 0.40        # Probability a bot greets a joining player
      delay:
        min: 2
        max: 6

    on-death:
      enabled: true
      players-only: false  # true = only react to player deaths (ignore mobs/animals)
      chance: 0.30
      delay:
        min: 1
        max: 4

    on-player-leave:
      enabled: true
      chance: 0.30
      delay:
        min: 1
        max: 4

    on-advancement:           # React when a player earns an announced advancement
      enabled: true
      chance: 0.45
      delay:
        min: 1
        max: 5

    on-first-join:            # Extra warm welcome for brand-new players (first join)
      enabled: true
      chance: 0.70            # Higher default — new players deserve a greeting!
      # Uses first-join-reactions pool (falls back to join-reactions if empty)

    on-kill:                  # React when a player kills another real player
      enabled: true
      chance: 0.35
      delay:
        min: 1
        max: 4

    on-high-level:            # React when a player hits a significant XP level milestone
      enabled: true
      min-level: 30           # Only react at this level and above (milestones: 30, 50, 75, 100…)
      chance: 0.35
      delay:
        min: 1
        max: 5

  # ── Player Chat Reactions ──────────────────────────────────────────────────
  # When a real player sends a chat message, a random bot may react.
  # Uses the "player-chat-reactions" pool in bot-messages.yml.
  # {player_name} = the player who sent the message, {name} = the reacting bot.
  on-player-chat:
    enabled: false          # Master switch for this feature
    use-ai: true            # Use AI to generate contextual replies (requires ai-conversations setup)
    ai-cooldown: 30         # Seconds before the same bot can react again (AI mode only)
    chance: 0.25            # Probability (0.0–1.0) a bot reacts to any player message
    max-bots: 1             # Max bots that react to a single message (1–3 recommended)
    ignore-short: true      # Skip messages shorter than 3 characters (avoids "k", "ok", etc.)
    ignore-commands: true   # Skip messages that start with / (commands)
    mention-player: 0.50    # Probability the reaction directly mentions the player's name
    delay:
      min: 2                # Min seconds before the reaction fires
      max: 8                # Max seconds before the reaction fires

  # ── Keyword Reactions ──────────────────────────────────────────────────────
  # When a player's message contains a keyword a random bot replies using the
  # matching pool from bot-messages.yml.
  keyword-reactions:
    enabled: false
    keywords: {}
    # Example:
    #   trade: "trade-reactions"
    #   help: "help-reactions"


# ═════════════════════════════════════════════════════════════════════════════
#  6 · AI CONVERSATIONS
#  Bots respond to /msg, /tell, /whisper with AI-generated replies that match
#  their personality. Each bot maintains per-player conversation history.
#
#  ⚠ Requires an API key in secrets.yml (OpenAI, Groq, Anthropic, etc.)
#     Set up: edit  plugins/FakePlayerPlugin/secrets.yml
#     Leave secrets.yml blank to disable AI conversations entirely.
#
#  Supported providers (priority order):
#    OpenAI · Anthropic · Groq · Google Gemini · Ollama · Copilot · Custom
# ═════════════════════════════════════════════════════════════════════════════
ai-conversations:
  enabled: true                          # Master toggle — set false to disable all AI DMs

  # ── Personality ─────────────────────────────────────────────────────────────
  # Default personality file used for all bots (unless overridden per-bot).
  # References a .txt file in plugins/FakePlayerPlugin/personalities/
  # Placeholder: {bot_name} = the bot's actual name
  # Override per-bot: /fpp personality <bot> set <name>
  # Custom prompts: drop .txt files in plugins/FakePlayerPlugin/personalities/
  default-personality: "default"   # Refers to personalities/default.txt

  # ── Typing Delay ─────────────────────────────────────────────────────────────
  # Simulate the bot typing before the message appears.
  # Delay is calculated as: base + (message-length * per-char) seconds, capped at max.
  typing-delay:
    enabled: true
    base: 1.0          # Base delay in seconds before any reply
    per-char: 0.07     # Extra seconds added per character in the response
    max: 5.0           # Maximum total delay in seconds

  # ── Behavior ────────────────────────────────────────────────────────────────
  max-history: 10          # How many message pairs (user + bot) to remember per conversation
  cooldown: 3              # Seconds before a bot can respond again to the same player

  # ── Debug ───────────────────────────────────────────────────────────────────
  debug: false             # Log all AI requests and responses to console


# ═════════════════════════════════════════════════════════════════════════════
#  7 · SCHEDULING
# ═════════════════════════════════════════════════════════════════════════════

# ── Swap / Session Rotation ───────────────────────────────────────────────────
# Bots periodically leave and rejoin to mimic real player session patterns.
# Each bot gets a randomised session duration and personality.
swap:
  enabled: false            # Master toggle — false = bots never swap out
  max-swapped-out: 0        # Max bots offline at once (0 = unlimited)
  min-online: 0             # Min bots that must stay online (0 = no floor); swap skips if removing one would go below
  same-name-on-rejoin: true # Reuse the same bot name when rejoining (if available)
  farewell-chat: true       # Bots say goodbye before leaving (requires fake-chat.enabled)
  greeting-chat: true       # Bots say hello when rejoining  (requires fake-chat.enabled)
  retry-rejoin: true        # Automatically retry if a rejoin spawn fails (e.g. max-bots hit)
  retry-delay: 60           # Seconds to wait before retrying a failed rejoin

  session:                  # How long a bot stays online
    min: 60                 # Minimum seconds  (60 = 1 min)
    max: 300                # Maximum seconds  (300 = 5 min)

  absence:                  # How long a bot stays offline between sessions
    min: 30                 # Minimum seconds
    max: 120                # Maximum seconds

# ── Peak Hours ────────────────────────────────────────────────────────────────
# Automatically adjusts how many bots are online based on time-of-day windows,
# mimicking natural player activity (busy evenings, quiet nights, weekend peaks).
#
# REQUIRES: swap.enabled: true
#
# How it works:
#   · Every 60 s the scheduler compares the current server time to the schedule.
#   · The matching window's fraction is applied to the total bot pool.
#     Example: fraction 0.75 = 75 % of bots online, 25 % sleeping.
#   · Transitions are staggered so joins/leaves look natural.
#
# Commands: /fpp peaks status | next | force | list | wake <name> | sleep <name>
peak-hours:
  enabled: false
  timezone: "UTC"             # Any java.time.ZoneId string, e.g. "America/New_York"
  stagger-seconds: 30         # Spread each transition over this many seconds
  min-online: 0               # Absolute minimum bots online regardless of fraction
  notify-transitions: false   # Notify admins with fpp.peaks when a window changes

  # ── Daily Schedule ─────────────────────────────────────────────────────────
  # First matching window wins. Midnight-crossing windows (e.g. 22:00→06:00) work.
  # fraction: 1.0 = all bots online · 0.0 = no bots online
  schedule:
    - { start: "06:00", end: "09:00", fraction: 0.30 }  # Early morning
    - { start: "09:00", end: "18:00", fraction: 0.75 }  # Daytime
    - { start: "18:00", end: "22:00", fraction: 1.00 }  # Evening peak
    - { start: "22:00", end: "06:00", fraction: 0.05 }  # Night

  # ── Day-of-Week Overrides ──────────────────────────────────────────────────
  # Key must be in UPPERCASE: MONDAY TUESDAY WEDNESDAY THURSDAY FRIDAY SATURDAY SUNDAY
  # Remove an entry to fall back to the default schedule above.
  day-overrides:
    SATURDAY:
      - { start: "10:00", end: "23:00", fraction: 1.00 }  # Weekend peak
      - { start: "23:00", end: "10:00", fraction: 0.10 }  # Late night
    SUNDAY:
      - { start: "10:00", end: "22:00", fraction: 0.90 }
      - { start: "22:00", end: "10:00", fraction: 0.10 }


# ═════════════════════════════════════════════════════════════════════════════
#  8 · DATABASE & NETWORK
#  Records every bot session for auditing and /fpp info queries.
#  SQLite: zero-config, stored at  plugins/FakePlayerPlugin/data/fpp.db
#  MySQL:  required for multi-server (Velocity / BungeeCord) setups
#
#  mode: LOCAL   — single server. No cross-server filtering.
#  mode: NETWORK — shared MySQL across multiple backend servers.
#                  Each server tags its rows with server-id so bots stay isolated.
#
#  Quick proxy setup:
#    1. Set mode: "NETWORK"
#    2. Assign a unique server-id to each backend (e.g. "survival", "skyblock")
#    3. Enable mysql-enabled and fill in credentials
#    4. Velocity: set bungeecord-compat-mode: true in velocity.toml
#    5. Run /fpp reload on every server
# ═════════════════════════════════════════════════════════════════════════════
database:
  enabled: true           # false = no DB I/O, no analytics, file-based persistence only
  mode: "LOCAL"           # LOCAL or NETWORK
  server-id: "default"    # Unique name for this server (only matters in NETWORK mode)

  mysql-enabled: false
  mysql:
    host: "localhost"
    port: 3306
    database: "fpp"
    username: "root"
    password: ""
    use-ssl: false
    pool-size: 5
    connection-timeout: 30000

  location-flush-interval: 30  # Seconds between bot-position flushes to the DB
  session-history:
    max-rows: 20               # Max rows returned per /fpp info query

# ── Config Sync ───────────────────────────────────────────────────────────────
# Push/pull config files across backend servers via the shared MySQL database.
# Only active in NETWORK mode with database enabled.
# DISABLED  — no syncing
# MANUAL    — sync only via /fpp sync commands
# AUTO_PULL — pull the latest config on startup and /fpp reload
# AUTO_PUSH — push config changes automatically
config-sync:
  mode: "DISABLED"


# ═════════════════════════════════════════════════════════════════════════════
#  9 · PERFORMANCE
#  Tuning knobs for high-bot-count deployments.
#  These do not affect gameplay correctness — only main-thread tick budget.
# ═════════════════════════════════════════════════════════════════════════════
performance:
  # Maximum distance (blocks) at which a moving bot sends per-tick position-sync
  # packets to a real player. Players beyond this range cannot see the bot anyway.
  # 0 = send to all online players regardless of distance (old behaviour).
  # Recommended: 128 (matches the standard player entity-tracking range).
  position-sync-distance: 128.0


# ═════════════════════════════════════════════════════════════════════════════
#  10 · DEBUG & LOGGING
#  All flags are false by default for clean production logs.
#  Set only the subsystem you need to inspect — or flip debug: true to enable all.
# ═════════════════════════════════════════════════════════════════════════════
debug: false   # Master switch — true enables every category below at once

logging:
  debug:
    startup: false      # Startup flow, reloads, and compatibility checks
    nms: false          # NMS reflection, fake connection, and entity spawning
    packets: false      # Tab-list and entity packet construction / sending
    luckperms: false    # LuckPerms group sync and prefix refresh
    network: false      # Velocity/Bungee plugin messaging and remote bot sync
    config-sync: false  # Config push/pull activity
    skin: false          # Skin loading and injection
    database: false     # DB init, migrations, and session writes
    chat: false         # Bot chat AI scheduling, reactions, and event triggers
    swap: false         # Swap / session-rotation leave + rejoin lifecycle

# ── Update Checker ────────────────────────────────────────────────────────────
update-checker:
  enabled: true   # Check for new plugin versions on startup and /fpp reload

# ── NameTag Integration ───────────────────────────────────────────────────────
# Soft-dependency on the NameTag plugin (lode.gg). These settings only apply
# when NameTag is installed alongside FakePlayerPlugin.
# ── Attack Mob Targeting ──────────────────────────────────────────────────────
# Defaults for /fpp attack --mob (PvE auto-targeting mode).
attack-mob:
  default-range: 8.0          # Detection radius in blocks (overridden with --range)
  default-priority: nearest   # nearest | lowest-health
  smooth-rotation-speed: 12.0 # Degrees per tick for head rotation toward target
  retarget-interval: 10       # Ticks between scanning for a new target (when idle)
  line-of-sight: true         # Require unobstructed line of sight to target

nametag-integration:
  # Prevent spawning a bot whose --name matches a real player's current NameTag
  # nick. Blocks the spawn and sends 'spawn-name-taken-nick' to the sender.
  block-nick-conflicts: true
  # After each bot spawns, remove it from NameTag's internal player cache.
  # This prevents NameTag from treating bots as real players and attempting to
  # store or apply nick data to them. If a bot already has a nick set via NameTag,
  # the cache entry is preserved (see sync-nick-as-rename below).
  bot-isolation: true
  # When a bot has a NameTag nick set (e.g. via /nick BotA Steve), automatically
  # trigger FPP's rename command so the bot's actual Minecraft name becomes "Steve".
  # The rename is silent (console-only output) and preserves all bot state.
  # Requires bot-isolation: true. Default false — opt in consciously.
  sync-nick-as-rename: false

# ── Metrics ───────────────────────────────────────────────────────────────────
# Anonymous usage statistics via FastStats. No personal data collected.
metrics:
  enabled: true
